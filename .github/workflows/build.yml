name: Ultimate Android Native Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup QEMU for ARM64 Emulation
        uses: docker/setup-qemu-action@v3

      - name: Build inside Virtual Termux (ARM64)
        run: |
          docker run --rm --privileged -v ${{ github.workspace }}:/workspace -w /workspace termux/termux-docker:aarch64 bash -c "
            pkg update -y &&
            pkg install -y python binutils patchelf clang &&
            pip install nuitka zstandard yt-dlp &&
            python -m nuitka --onefile --remove-output -o yt-dlp-android.bin yt-dlp.py
          "

      - name: Upload Android Executable
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-android
          path: yt-dlp-android.bin
