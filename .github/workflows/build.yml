name: Android ARM64 Stable Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu patchelf
          pip install nuitka zstandard yt-dlp

      - name: Build Binary
        run: |
          # Nuitka-কে বলে দেওয়া হচ্ছে এটি যেন ARM64 এর জন্য তৈরি হয়
          CC=aarch64-linux-gnu-gcc \
          python3 -m nuitka \
            --onefile \
            --standalone \
            --remove-output \
            -o yt-dlp-android.bin \
            yt-dlp.py

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-android
          path: yt-dlp-android.bin
