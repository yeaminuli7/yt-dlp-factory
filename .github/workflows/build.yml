name: Universal Multi-Binary Build
on: [push]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: Android_Linux
            ext: bin
          - os: windows-latest
            platform: Windows_PC
            ext: exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install nuitka zstandard yt-dlp
      - name: Build
        run: python -m nuitka --onefile --remove-output yt-dlp.py -o yt-dlp.${{ matrix.ext }}
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-${{ matrix.platform }}
          path: yt-dlp.${{ matrix.ext }}
